    <section>
        <h1>Get In Touch</h1>
        <p>Have a question or just want to say hi?</p>

        <h1>Send Me a Message</h1>
        <form action="#" method="post">
            <p>~ Personal Information</p>
            <label for="fullname">Full Name:</label><br>
            <input type="text" id="fullname" name="fullname" placeholder="e.g. Kyrelle Ramos" required><br><br>

            <label for="email">Email Address:</label><br>
            <input type="email" id="email" name="email" placeholder="e.g. youremail@email.com" required><br><br>

            <p>~ Your message</p>
            <label for="message">Message:</label><br>
            <textarea id="message" name="message" rows="5" cols="40" placeholder="Write your message here..."></textarea><br><br>

            <input type="submit" value="Send Message">
            <input type="reset" value="Clear Form">

        </form>
    </section>
